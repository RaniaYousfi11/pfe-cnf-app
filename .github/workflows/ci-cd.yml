name: CI-CD DevSecOps GitOps PFE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Test application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py
      - run: echo " Test application OK"

  validate-dockerfile:
    name: Validate Dockerfile
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: |
          test -f Dockerfile && echo " Dockerfile existe"
          test -f requirements.txt && echo " requirements.txt existe"
          test -f app/main.py && echo " app/main.py existe"

  build-scan-push:
    name: Build, scan and push Docker image
    runs-on: ubuntu-latest
    needs: validate-dockerfile
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "Tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:latest

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.SHORT_SHA }}
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
        continue-on-error: true

      - run: echo " Image publiée ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.SHORT_SHA }}"

  update-gitops:
    name: Update GitOps repository
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Set image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: RaniaYousfi11/pfe-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: pfe-gitops

      - name: Update image tag in deployments
        run: |
          cd pfe-gitops
          find apps -name "deployment.yaml" | while read f; do
            sed -i "s|image: raniayousfi11/pfe-cnf-app:.*|image: raniayousfi11/pfe-cnf-app:${SHORT_SHA}|g" "$f"
            echo "Mis à jour: $f"
          done

      - name: Commit and push
        run: |
          cd pfe-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/
          if git diff --staged --quiet; then
            echo "Aucun changement"
          else
            git commit -m "ci: deploy image tag ${SHORT_SHA} [skip ci]"
            git push
            echo " GitOps mis à jour avec tag ${SHORT_SHA}"
          fi
