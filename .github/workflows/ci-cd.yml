name: CI-CD DevSecOps GitOps PFE

on:
  push:
    branches:
      - main

env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
 DOCKERHUB_IMAGE: raniayousfi11/pfe-cnf-app

jobs:
  test:
    name: Test application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile app/main.py

  validate-dockerfile:
    name: Validate Dockerfile
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f Dockerfile
          test -f requirements.txt
          test -f app/main.py
          echo "Required files exist"

  build-scan-push:
    name: Build, scan and push Docker image
    runs-on: ubuntu-latest
    needs: validate-dockerfile

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set short image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Check Docker Hub token
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN is missing"
            exit 1
          fi
          echo "Docker Hub token exists"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: raniayousfi11
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.SHORT_SHA }}
            ${{ env.DOCKERHUB_IMAGE }}:latest

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE }}:${{ env.SHORT_SHA }}
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL

      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.SHORT_SHA }}
            ${{ env.DOCKERHUB_IMAGE }}:latest

      - name: Show published image
        run: |
          echo "Image published: ${{ env.DOCKERHUB_IMAGE }}:${SHORT_SHA}"

  update-gitops:
    name: Update GitOps repository
    runs-on: ubuntu-latest
    needs: build-scan-push

    steps:
      - name: Set short image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: RaniaYousfi11/pfe-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: pfe-gitops

      - name: Update image tag in GitOps manifests
        run: |
          cd pfe-gitops
          sed -i "s|newTag: .*|newTag: ${SHORT_SHA}|g" apps/base/kustomization.yaml
          find apps/hss apps/udm apps/drf -name "deployment.yaml" \
            -exec sed -i "s|image: .*|image: raniayousfi11/pfe-cnf-app:${SHORT_SHA}|g" {} \;

      - name: Commit and push GitOps update
        run: |
          cd pfe-gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/base/kustomization.yaml apps/hss apps/udm apps/drf
          git commit -m "Update CNF image tag to ${SHORT_SHA}" || echo "No changes to commit"
          git push
