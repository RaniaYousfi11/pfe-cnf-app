name: CI-CD DevSecOps GitOps PFE

on:
  push:
    branches: [main]

jobs:

  test:
    name: Test application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile app/main.py
      - name: Health check
        run: echo "Test OK"

  build-and-push:
    name: Build, scan and push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.IMAGE_TAG }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.IMAGE_TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:latest

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:latest
          echo "Image publiee : ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.IMAGE_TAG }}"

  update-gitops:
    name: Update GitOps repository
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: RaniaYousfi11/pfe-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: pfe-gitops

      - name: Update deployments
        run: |
          cd pfe-gitops
          find apps -name "deployment.yaml" | while read f; do
            sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/pfe-cnf-app:${{ env.IMAGE_TAG }}|g" "$f"
            echo "Mis a jour: $f"
          done

      - name: Commit and push
        run: |
          cd pfe-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/
          git diff --staged --quiet || git commit -m "ci: deploy image ${{ env.IMAGE_TAG }}"
          git push || echo "Rien a pousser"
